<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Chá de Panela · Fernanda &amp; Matheus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Firebase (banco de dados compartilhado — funciona em qualquer lugar que hospede este arquivo, não só dentro do Claude) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
/* ======================================================================
   VARIÁVEIS DE IDENTIDADE VISUAL
   Paleta inspirada no Save the Date / Convite: azul serenity, off-white
   e rosa quartzo. Tudo abaixo deriva destas variáveis — nada de cores
   soltas no meio do código.
   ====================================================================== */
:root{
  --azul-serenity:      #8FA9C4;
  --azul-serenity-esc:  #6C8AAB;
  --azul-serenity-cl:   #C4D3E2;
  --off-white:          #F9F8F3;
  --rosa-quartzo:       #DCA498;
  --rosa-quartzo-esc:   #C67F71;
  --tinta:              #46403A;   /* quase-preto quente, para texto */
  --tinta-suave:        #7A7369;
  --linha:              #E7E2D6;
  --branco:             #FFFFFF;
  --sombra: 0 10px 30px -12px rgba(70,64,58,0.18);
  --sombra-sm: 0 4px 14px -6px rgba(70,64,58,0.14);
  --raio: 18px;
  --raio-sm: 10px;
  --serif: 'Playfair Display', serif;
  --sans: 'Montserrat', 'Inter', -apple-system, sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--off-white);
  color:var(--tinta);
  font-family:var(--sans);
  font-weight:400;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
h1,h2,h3,.serif{font-family:var(--serif);}
button{font-family:var(--sans);}
img{max-width:100%;display:block;}
a{color:inherit;}

/* Foco visível para acessibilidade de teclado */
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
  outline:2px solid var(--azul-serenity-esc);
  outline-offset:2px;
}

/* ======================================================================
   ELEMENTO-ASSINATURA: divisor floral em linha, usado como fio condutor
   visual entre seções (hero, formulário, presentes, admin). É a peça
   decorativa recorrente que amarra a identidade do convite.
   ====================================================================== */
.divisor-floral{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin:22px 0;color:var(--rosa-quartzo-esc);
  user-select:none;
}
.divisor-floral .traco{height:1px;width:56px;background:linear-gradient(90deg,transparent,var(--linha) 30%,var(--linha) 70%,transparent);}
.divisor-floral svg{width:22px;height:22px;opacity:.85;}

/* ======================================================================
   LAYOUT GERAL
   ====================================================================== */
#app-shell{position:relative;min-height:100vh;}
#app{min-height:100vh;}

.pagina-convidado{
  max-width:480px;
  margin:0 auto;
  padding:36px 20px 60px;
}

.hero{
  text-align:center;
  padding-bottom:6px;
}
.hero .monograma{
  font-family:var(--serif);
  font-style:italic;
  font-size:15px;
  letter-spacing:3px;
  color:var(--azul-serenity-esc);
  text-transform:uppercase;
}
.hero h1{
  margin:10px 0 4px;
  font-size:34px;
  font-weight:600;
  color:var(--tinta);
  line-height:1.15;
}
.hero h1 em{
  font-style:italic;
  color:var(--rosa-quartzo-esc);
}
.hero .data-evento{
  font-size:13.5px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--tinta-suave);
  font-weight:500;
}
.hero .subtitulo{
  margin-top:14px;
  font-size:14.5px;
  color:var(--tinta-suave);
  max-width:360px;
  margin-left:auto;margin-right:auto;
}

/* ======================================================================
   CARTÕES / FORMULÁRIOS
   ====================================================================== */
.cartao{
  background:var(--branco);
  border:1px solid var(--linha);
  border-radius:var(--raio);
  box-shadow:var(--sombra);
  padding:26px 22px;
  margin-top:18px;
}

.campo{margin-bottom:18px;}
.campo label{
  display:block;
  font-size:12.5px;
  font-weight:600;
  letter-spacing:.6px;
  text-transform:uppercase;
  color:var(--tinta-suave);
  margin-bottom:8px;
}
.campo input[type="text"],
.campo input[type="url"],
.campo input[type="password"],
.campo select,
.campo textarea{
  width:100%;
  padding:13px 14px;
  border-radius:var(--raio-sm);
  border:1.5px solid var(--linha);
  background:var(--off-white);
  font-size:15px;
  color:var(--tinta);
  font-family:var(--sans);
  transition:border-color .15s ease;
}
.campo textarea{resize:vertical;min-height:84px;line-height:1.5;}
.campo input:focus, .campo select:focus, .campo textarea:focus{border-color:var(--azul-serenity);}
.campo .dica{font-size:11.5px;color:var(--tinta-suave);margin-top:6px;}

.radio-grupo{display:flex;flex-direction:column;gap:10px;}
.radio-opcao{
  display:flex;align-items:center;gap:12px;
  border:1.5px solid var(--linha);
  border-radius:var(--raio-sm);
  padding:13px 14px;
  cursor:pointer;
  transition:border-color .15s ease, background .15s ease;
}
.radio-opcao:hover{border-color:var(--azul-serenity-cl);}
.radio-opcao input{accent-color:var(--azul-serenity-esc);width:18px;height:18px;flex-shrink:0;}
.radio-opcao.selecionada{
  border-color:var(--azul-serenity-esc);
  background:rgba(143,169,196,0.08);
}
.radio-opcao span{font-size:14.5px;font-weight:500;}

/* Botões */
.botao{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  width:100%;
  padding:14px 18px;
  border-radius:999px;
  border:none;
  font-size:14.5px;
  font-weight:600;
  letter-spacing:.3px;
  cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.botao:active{transform:scale(0.98);}
.botao-primario{
  background:var(--azul-serenity-esc);
  color:var(--branco);
  box-shadow:0 8px 20px -8px rgba(108,138,171,0.65);
}
.botao-primario:hover{background:var(--azul-serenity);}
.botao-secundario{
  background:var(--rosa-quartzo);
  color:var(--branco);
  box-shadow:0 8px 20px -8px rgba(198,127,113,0.55);
}
.botao-secundario:hover{background:var(--rosa-quartzo-esc);}
.botao-fantasma{
  background:transparent;
  color:var(--tinta-suave);
  border:1.5px solid var(--linha);
  box-shadow:none;
}
.botao-fantasma:hover{border-color:var(--rosa-quartzo);color:var(--rosa-quartzo-esc);}
.botao-desabilitado, .botao:disabled{
  background:var(--linha) !important;
  color:var(--tinta-suave) !important;
  box-shadow:none !important;
  cursor:not-allowed;
}
.botao-pequeno{width:auto;padding:9px 16px;font-size:12.5px;}

/* Aviso informativo (sem transações financeiras) */
.aviso{
  display:flex;gap:10px;align-items:flex-start;
  background:rgba(220,164,152,0.12);
  border:1px solid rgba(220,164,152,0.4);
  border-radius:var(--raio-sm);
  padding:13px 14px;
  font-size:12.8px;
  color:var(--tinta);
  margin:16px 0 20px;
}
.aviso svg{flex-shrink:0;width:18px;height:18px;color:var(--rosa-quartzo-esc);margin-top:1px;}

.aviso-ambiente{
  background:rgba(230,168,54,0.14);
  border-color:rgba(230,168,54,0.5);
  color:#6B4E12;
}
.aviso-ambiente svg{color:#B8860B;}

/* ======================================================================
   LISTA DE PRESENTES
   ====================================================================== */
.secao-titulo{
  font-size:21px;
  font-weight:600;
  text-align:center;
  margin:6px 0 2px;
}
.secao-legenda{
  text-align:center;
  font-size:13px;
  color:var(--tinta-suave);
  margin-bottom:4px;
}

.grade-presentes{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
  margin-top:18px;
}
@media (min-width:600px){
  .grade-presentes{grid-template-columns:1fr 1fr;}
}

.presente-card{
  background:var(--branco);
  border:1px solid var(--linha);
  border-radius:var(--raio);
  overflow:hidden;
  box-shadow:var(--sombra-sm);
  display:flex;flex-direction:column;
}
.presente-foto{
  width:100%;
  aspect-ratio:4/3;
  object-fit:cover;
  background:var(--azul-serenity-cl);
}
.presente-corpo{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1;}
.presente-nome{font-size:15.5px;font-weight:600;line-height:1.3;}
/* Faixa de preço: badge com "moedas" preenchidas conforme o nível (1-3),
   em vez de um texto cru "R$ X - mais" solto no card. */
.faixa-badge{
  align-self:flex-start;
  display:inline-flex;align-items:center;gap:6px;
  font-size:11.5px;
  font-weight:600;
  letter-spacing:.2px;
  padding:5px 11px 5px 9px;
  border-radius:999px;
  border:1px solid transparent;
}
.faixa-moedas{display:inline-flex;gap:2px;}
.faixa-moedas span{
  width:6px;height:6px;border-radius:50%;
  background:currentColor;opacity:.35;
}
.faixa-moedas span.acesa{opacity:1;}
.faixa-nivel-1{color:var(--azul-serenity-esc);background:rgba(143,169,196,0.14);border-color:rgba(143,169,196,0.3);}
.faixa-nivel-2{color:var(--rosa-quartzo-esc);background:rgba(220,164,152,0.18);border-color:rgba(220,164,152,0.35);}
.faixa-nivel-3{color:#8A6A2E;background:rgba(218,175,90,0.20);border-color:rgba(218,175,90,0.4);}
.presente-status{
  font-size:12px;
  font-weight:600;
  padding:8px 10px;
  border-radius:var(--raio-sm);
  text-align:center;
}
.status-disponivel{color:var(--tinta-suave);}
.status-reservado-outro{
  background:rgba(70,64,58,0.06);
  color:var(--tinta-suave);
}
.status-reservado-eu{
  background:rgba(220,164,152,0.16);
  color:var(--rosa-quartzo-esc);
}
.presente-acoes{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding-top:4px;}

/* ======================================================================
   RODAPÉ / ACESSO ADMIN
   ====================================================================== */
.rodape-admin{
  text-align:center;
  margin-top:36px;
  padding-top:16px;
  border-top:1px solid var(--linha);
}
.rodape-admin button{
  background:none;border:none;
  color:var(--tinta-suave);
  font-size:11.5px;
  letter-spacing:.4px;
  cursor:pointer;
  opacity:.55;
  padding:6px;
}
.rodape-admin button:hover{opacity:1;color:var(--azul-serenity-esc);}

/* ======================================================================
   PAINEL DO ADMINISTRADOR (desktop-first)
   ====================================================================== */
.pagina-admin{
  max-width:1180px;
  margin:0 auto;
  padding:32px 24px 70px;
}
.admin-topo{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:14px;
  margin-bottom:24px;
}
.admin-topo h1{font-size:26px;margin:0;font-weight:600;}
.admin-topo .subt{font-size:13px;color:var(--tinta-suave);margin-top:2px;}

.admin-resumo{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:14px;
  margin-bottom:26px;
}
.resumo-card{
  background:var(--branco);
  border:1px solid var(--linha);
  border-radius:var(--raio-sm);
  padding:16px 18px;
  box-shadow:var(--sombra-sm);
}
.resumo-card .num{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--azul-serenity-esc);}
.resumo-card .rot{font-size:11.5px;color:var(--tinta-suave);letter-spacing:.4px;text-transform:uppercase;margin-top:2px;}

.admin-bloco{
  background:var(--branco);
  border:1px solid var(--linha);
  border-radius:var(--raio);
  box-shadow:var(--sombra-sm);
  padding:22px 22px 26px;
  margin-bottom:26px;
}
.admin-bloco-topo{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;
  margin-bottom:16px;
}
.admin-bloco-topo h2{font-size:17px;margin:0;font-weight:600;}

.tabela-wrap{width:100%;overflow-x:auto;}
table.planilha{
  width:100%;
  border-collapse:collapse;
  font-size:13.5px;
  min-width:640px;
}
table.planilha thead th{
  text-align:left;
  font-size:11px;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:var(--tinta-suave);
  border-bottom:2px solid var(--linha);
  padding:10px 12px;
  white-space:nowrap;
}
table.planilha tbody td{
  padding:11px 12px;
  border-bottom:1px solid var(--linha);
  vertical-align:middle;
}
table.planilha tbody tr:hover{background:rgba(143,169,196,0.06);}
.tag{
  display:inline-block;
  font-size:11.5px;font-weight:600;
  padding:4px 10px;border-radius:999px;
}
.tag-sim{background:rgba(143,169,196,0.18);color:var(--azul-serenity-esc);}
.tag-nao{background:rgba(70,64,58,0.08);color:var(--tinta-suave);}
.tag-livre{background:rgba(220,164,152,0.15);color:var(--rosa-quartzo-esc);}

.form-inline{
  display:grid;
  grid-template-columns:1.6fr 1.5fr 1.1fr auto;
  gap:10px;
  align-items:end;
}
@media (max-width:900px){
  .form-inline{grid-template-columns:1fr;}
}
.form-inline .campo{margin-bottom:0;}

/* Upload de foto com miniatura de pré-visualização */
.upload-foto{
  display:flex;align-items:center;gap:10px;
}
.upload-foto .miniatura{
  width:52px;height:52px;
  border-radius:10px;
  object-fit:cover;
  border:1.5px solid var(--linha);
  background:var(--azul-serenity-cl);
  flex-shrink:0;
}
.upload-foto input[type="file"]{
  font-size:12px;
  width:100%;
}
.upload-foto input[type="file"]::file-selector-button{
  border:1.5px solid var(--linha);
  background:var(--branco);
  border-radius:999px;
  padding:8px 12px;
  font-size:11.5px;
  font-weight:600;
  color:var(--tinta-suave);
  cursor:pointer;
  margin-right:8px;
}

.acoes-topo-direita{display:flex;gap:10px;flex-wrap:wrap;}

.login-admin{
  max-width:380px;margin:80px auto;
  text-align:center;
}

.rodape-nota{
  text-align:center;font-size:11.5px;color:var(--tinta-suave);margin-top:10px;
}

.oculto{display:none !important;}

/* Pequena animação de entrada suave */
.fade-in{animation:fadeIn .35s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

@media (prefers-reduced-motion: reduce){
  .fade-in{animation:none;}
}

/* ======================================================================
   MODAL E TOAST (substituem prompt()/alert()/confirm() nativos, que ficam
   bloqueados dentro do iframe do artifact e fariam os botões parecerem
   "sem função")
   ====================================================================== */
.modal-overlay{
  position:absolute;inset:0;
  min-height:100%;
  background:rgba(70,64,58,0.42);
  display:flex;align-items:flex-start;justify-content:center;
  padding:20px;
  z-index:1000;
  animation:fadeIn .18s ease both;
}
.modal-overlay .modal-caixa{margin-top:8vh;}
.modal-caixa{
  background:var(--branco);
  border-radius:var(--raio);
  box-shadow:var(--sombra);
  padding:26px 24px;
  max-width:360px;width:100%;
  text-align:center;
}
.modal-caixa h3{margin:0 0 6px;font-size:19px;font-weight:600;}
.modal-caixa p{margin:0 0 16px;font-size:13.5px;color:var(--tinta-suave);}
.modal-caixa .campo{text-align:left;margin-bottom:16px;}
.modal-botoes{display:flex;gap:10px;margin-top:4px;}
.modal-botoes .botao{width:auto;flex:1;}
.modal-erro-msg{
  color:var(--rosa-quartzo-esc);
  font-size:12.5px;
  min-height:16px;
  margin:-8px 0 12px;
}

#toast-container{
  position:absolute;
  top:16px;left:50%;
  transform:translateX(-50%);
  z-index:2000;
  display:flex;flex-direction:column;gap:8px;
  width:calc(100% - 32px);
  max-width:400px;
  pointer-events:none;
}
.toast{
  background:var(--tinta);
  color:var(--branco);
  font-size:13px;
  font-weight:500;
  padding:12px 16px;
  border-radius:var(--raio-sm);
  box-shadow:var(--sombra);
  text-align:center;
  animation:fadeIn .2s ease both;
}
.toast.toast-erro{background:var(--rosa-quartzo-esc);}
</style>
</head>

<script>
/* =========================================================================
   CHÁ DE PANELA — Fernanda & Matheus
   Aplicação single-file (HTML + CSS + JS vanilla).

   ARMAZENAMENTO
   -------------
   Os convidados abrem este link em celulares DIFERENTES (via WhatsApp).
   Por isso, em vez de localStorage (que é isolado por aparelho e não
   serviria para uma lista de presentes compartilhada), usamos o Firebase
   Firestore — um banco de dados na nuvem, gratuito para este uso — como
   fonte única de dados. Assim, quando alguém reserva um presente, todos
   os outros convidados — e a noiva/administrador — veem a mesma
   informação, de qualquer dispositivo, em qualquer lugar (GitHub Pages,
   Firebase Hosting, Netlify, etc.).
   IMPORTANTE: troque o objeto `firebaseConfig` logo abaixo pelos valores
   do SEU projeto Firebase antes de publicar este arquivo.

   "SESSÃO" DO CONVIDADO
   ----------------------
   Como não usamos cookies/localStorage, identificamos o convidado atual
   pelo NOME que ele digita (é natural: é assim que ele se identifica na
   lista mesmo). Se a pessoa atualizar a página, basta digitar o mesmo
   nome novamente para recuperar sua reserva.
   ========================================================================= */

// ------------------------- CONFIGURAÇÃO -------------------------------
const NOIVOS = { ela: 'Fernanda', ele: 'Matheus' };
const SENHA_ADMIN = 'matefer26'; // troque aqui se quiser outra senha

const CHAVE_PRESENTES = 'cha_panela_presentes';
const CHAVE_CONVIDADOS = 'cha_panela_convidados';
const CHAVE_CONFIG = 'cha_panela_config';

// =========================================================================
// CONFIGURAÇÃO DO FIREBASE — TROQUE PELOS VALORES DO SEU PROJETO
// -------------------------------------------------------------------------
// Vá em https://console.firebase.google.com > seu projeto > ícone de
// engrenagem "Configurações do projeto" > aba "Geral" > seção "Seus
// aplicativos" > app Web > copie o objeto "firebaseConfig" e cole aqui.
// =========================================================================
const firebaseConfig = {
  apiKey: "AIzaSyASIt4YvZaZ5cR3Bu6jT-bHp0vyKOf8hi0",
  authDomain: "cha-de-panela-mat-e-fer.firebaseapp.com",
  projectId: "cha-de-panela-mat-e-fer",
  storageBucket: "cha-de-panela-mat-e-fer.firebasestorage.app",
  messagingSenderId: "291715785616",
  appId: "1:291715785616:web:a6b30e9fbdfbf493368915"
};

const COLECAO_FIRESTORE = 'cha_panela';
let db = null;
try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}catch(e){
  console.error('Falha ao inicializar o Firebase — confira o firebaseConfig.', e);
}

// Mensagem/data do convite — editável pela área administrativa.
// Os valores abaixo são só o padrão inicial; quem manda de verdade é o
// que estiver salvo em CHAVE_CONFIG (compartilhado com todo mundo).
const CONFIG_PADRAO = {
  dataEvento: 'Data a confirmar em breve',
  mensagem: 'Confirme sua presença e, se quiser, escolha com carinho um presente para nos ajudar a montar nosso novo lar.'
};
let configuracoes = { ...CONFIG_PADRAO };

// Faixas de preço como um pequeno catálogo (código interno + rótulo +
// nível visual de 1 a 3), em vez de strings soltas — fica mais fácil de
// estilizar e de manter consistente em toda a aplicação.
const FAIXAS_PRECO = [
  { codigo:'ate-50',    rotulo:'Até R$ 50',        nivel:1 },
  { codigo:'50-100',    rotulo:'R$ 50 – R$ 100',    nivel:2 },
  { codigo:'acima-100', rotulo:'Acima de R$ 100',   nivel:3 },
];
function infoFaixa(codigo){
  return FAIXAS_PRECO.find(f => f.codigo === codigo) || FAIXAS_PRECO[0];
}
function rotuloFaixa(codigo){ return infoFaixa(codigo).rotulo; }
// Migra valores antigos (ex.: "R$ 100 - mais") para os novos códigos,
// para não perder dados já salvos ao evoluir o app.
function normalizarFaixa(valor){
  if(FAIXAS_PRECO.some(f => f.codigo === valor)) return valor;
  const v = String(valor||'').toLowerCase();
  if(v.includes('mais') || v.includes('acima')) return 'acima-100';
  if(v.includes('50') && v.includes('100')) return '50-100';
  return 'ate-50';
}

async function testarAmbienteStorage(){
  if(!db){ armazenamentoDisponivel = false; return; }
  try{
    const chaveTeste = 'cha_panela_teste_ambiente';
    const valorTeste = String(Date.now());
    await db.collection(COLECAO_FIRESTORE).doc(chaveTeste).set({ dados: valorTeste });

// ------------------------- HELPERS DE STORAGE ---------------------------
async function lerChave(chave){
  if(!db) return null;
  try{
    const doc = await db.collection(COLECAO_FIRESTORE).doc(chave).get();
    return doc.exists ? JSON.parse(doc.data().dados) : null;
  }catch(e){
    console.error('Falha ao ler', chave, e);
    return null;
  }
}
async function gravarChave(chave, valor){
  if(!db) return false;
  try{
    await db.collection(COLECAO_FIRESTORE).doc(chave).set({
      dados: JSON.stringify(valor),
      atualizadoEm: new Date().toISOString()
    });
    return true;
  }catch(e){
    console.error('Falha ao gravar', chave, e);
    return false;
  }
}

async function carregarDados(){
  const p = await lerChave(CHAVE_PRESENTES);
  if(p && Array.isArray(p) && p.length){
    presentes = p.map(item => ({ ...item, preco: normalizarFaixa(item.preco) }));
  }else{
    presentes = PRESENTES_PADRAO.map(x => ({...x}));
    await gravarChave(CHAVE_PRESENTES, presentes);
  }
  const c = await lerChave(CHAVE_CONVIDADOS);
  convidados = (c && Array.isArray(c)) ? c : [];

  const cfg = await lerChave(CHAVE_CONFIG);
  if(cfg && typeof cfg === 'object'){
    configuracoes = { ...CONFIG_PADRAO, ...cfg };
  }else{
    configuracoes = { ...CONFIG_PADRAO };
    await gravarChave(CHAVE_CONFIG, configuracoes);
  }
}

// Redimensiona/comprime uma imagem escolhida no computador antes de
// guardá-la (como Data URL) — mantém o armazenamento compartilhado leve
// mesmo com várias fotos cadastradas.
function redimensionarImagem(arquivo, larguraMax = 640, qualidade = 0.72){
  return new Promise((resolve, reject) => {
    const leitor = new FileReader();
    leitor.onerror = () => reject(new Error('Falha ao ler o arquivo'));
    leitor.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Falha ao carregar a imagem'));
      img.onload = () => {
        const escala = Math.min(1, larguraMax / img.width);
        const w = Math.round(img.width * escala);
        const h = Math.round(img.height * escala);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', qualidade));
      };
      img.src = leitor.result;
    };
    leitor.readAsDataURL(arquivo);
  });
}

// ------------------------- UTIL -------------------------------
function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}
function normalizarNome(n){ return String(n||'').trim().toLowerCase(); }
function formatarDataHora(iso){
  const d = new Date(iso);
  return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function iconeFloral(){

}
function renderFaixaBadge(codigo){
  const f = infoFaixa(codigo);
  const moedas = [1,2,3].map(n => `<span class="${n <= f.nivel ? 'acesa' : ''}"></span>`).join('');

}

// ------------------------- TOAST (substitui alert()) -------------------------------
// Observação: window.prompt / alert / confirm ficam bloqueados dentro do
// iframe sandbox do artifact — por isso construímos versões próprias em
// HTML, que funcionam de forma confiável em qualquer navegador.
function garantirToastContainer(){
  let c = document.getElementById('toast-container');
  if(!c){
    c = document.createElement('div');
    c.id = 'toast-container';
    document.getElementById('app-shell').appendChild(c);
  }
  return c;
}
function mostrarToast(mensagem, tipo){
  const c = garantirToastContainer();
  const el = document.createElement('div');
  el.className = 'toast' + (tipo === 'erro' ? ' toast-erro' : '');
  el.textContent = mensagem;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ------------------------- MODAL (substitui prompt()/confirm()) -------------------------------
function abrirModal(innerHtml){
  fecharModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-ativo';
  overlay.innerHTML = `<div class="modal-caixa">${innerHtml}</div>`;
  overlay.addEventListener('click', (ev) => { if(ev.target === overlay) fecharModal(); });
  document.getElementById('app-shell').appendChild(overlay);
  return overlay;
}
function fecharModal(){
  const existente = document.getElementById('modal-overlay-ativo');
  if(existente) existente.remove();
}

function abrirModalConfirmacao(mensagem, aoConfirmar){

      <button type="button" class="botao botao-secundario" id="modal-confirmar">Confirmar</button>

async function handleSubmitEntrada(ev){
  ev.preventDefault();
  const nome = document.getElementById('input-nome').value.trim();
  const rsvpEl = document.querySelector('input[name="rsvp"]:checked');
  if(!nome){ mostrarToast('Por favor, digite seu nome completo.', 'erro'); return; }
  if(!rsvpEl){ mostrarToast('Por favor, selecione se você vai comparecer.', 'erro'); return; }
  const rsvp = rsvpEl.value;

  nomeConvidadoAtual = nome;

  // procura registro existente (mesma pessoa, ex.: recarregou a página)
  const existente = convidados.find(g => normalizarNome(g.nome) === normalizarNome(nome));
  if(existente){
    existente.rsvp = rsvp;
    existente.timestamp = new Date().toISOString();
  }else{
    convidados.push({ nome, rsvp, timestamp: new Date().toISOString() });
  }
  await gravarChave(CHAVE_CONVIDADOS, convidados);

  if(rsvp === 'sim'){
    await carregarDados(); // garante presentes atualizados de outros dispositivos
    renderListaPresentes();
  }else{
    renderObrigadoNaoVai();
  }
}

function desenharGradePresentes(){
  const container = document.getElementById('grade-presentes-container');
  if(!container) return;

  const cards = presentes.map(p => {
    let statusHtml, acoesHtml;
    if(!p.reservadoPor){
      statusHtml = `<div class="presente-status status-disponivel">Disponível</div>`;
      acoesHtml = `<button class="botao botao-primario btn-reservar" data-id="${p.id}">Reservar Presente</button>`;
    }else if(normalizarNome(p.reservadoPor) === normalizarNome(nomeConvidadoAtual)){
      statusHtml = `<div class="presente-status status-reservado-eu">Você reservou este presente ✓</div>`;
      acoesHtml = `<button class="botao botao-secundario btn-cancelar" data-id="${p.id}">Cancelar Reserva</button>`;
    }else{
      statusHtml = `<div class="presente-status status-reservado-outro">Reservado por ${escapeHtml(p.reservadoPor)}</div>`;
      acoesHtml = `<button class="botao botao-desabilitado" disabled>Reservado</button>`;
    }

    return `
      <div class="presente-card" data-card-id="${p.id}">
        <img class="presente-foto" src="${p.foto}" alt="${escapeHtml(p.nome)}" loading="lazy">
        <div class="presente-corpo">
          <div class="presente-nome">${escapeHtml(p.nome)}</div>
          ${renderFaixaBadge(p.preco)}
          ${statusHtml}
          <div class="presente-acoes">${acoesHtml}</div>
        </div>
      </div>
    `;
  }).join('');

  container.innerHTML = `<div class="grade-presentes">${cards}</div>`;

  container.querySelectorAll('.btn-reservar').forEach(btn=>{
    btn.addEventListener('click', () => reservarPresente(btn.dataset.id));
  });
  container.querySelectorAll('.btn-cancelar').forEach(btn=>{
    btn.addEventListener('click', () => cancelarReserva(btn.dataset.id));
  });
}

async function reservarPresente(id){
  // recarrega dados mais recentes para evitar conflito com outro convidado
  const maisRecentes = await lerChave(CHAVE_PRESENTES);
  if(maisRecentes) presentes = maisRecentes;

  const presente = presentes.find(p => p.id === id);
  if(!presente) return;
  if(presente.reservadoPor){
    mostrarToast('Ops! Esse presente acabou de ser reservado por outra pessoa. Escolha outro, por favor.', 'erro');
    desenharGradePresentes();
    return;
  }
  presente.reservadoPor = nomeConvidadoAtual;
  await gravarChave(CHAVE_PRESENTES, presentes);
  desenharGradePresentes();
  mostrarModalPosReserva(presente.nome);
}

async function cancelarReserva(id){
  const presente = presentes.find(p => p.id === id);
  if(!presente) return;
  if(normalizarNome(presente.reservadoPor) !== normalizarNome(nomeConvidadoAtual)) return;
  presente.reservadoPor = null;
  await gravarChave(CHAVE_PRESENTES, presentes);
  desenharGradePresentes();
}

// Atualização periódica (para refletir reservas feitas em outros celulares)
function iniciarAtualizacaoAutomatica(){
  pararAtualizacaoAutomatica();
  intervaloAtualizacao = setInterval(async () => {
    if(telaAtual !== 'lista-presentes') return;
    const maisRecentes = await lerChave(CHAVE_PRESENTES);
    if(maisRecentes){
      presentes = maisRecentes;
      desenharGradePresentes();
    }
  }, 5000);
}
function pararAtualizacaoAutomatica(){
  if(intervaloAtualizacao){ clearInterval(intervaloAtualizacao); intervaloAtualizacao = null; }
}

        <button type="submit" class="botao botao-primario">Entrar</button>
      </div>
    </form>
  `);

  const form = overlay.querySelector('#form-senha-admin');
  const input = overlay.querySelector('#input-senha-admin');
  const erroEl = overlay.querySelector('#erro-senha-admin');

  input.focus();
  overlay.querySelector('#modal-cancelar-admin').addEventListener('click', fecharModal);

  form.addEventListener('submit', (ev) => {
    ev.preventDefault();
    if(input.value === SENHA_ADMIN){
      fecharModal();
      renderAdmin();
    }else{
      erroEl.textContent = 'Senha incorreta. Tente novamente.';
      input.value = '';
      input.focus();
    }
  });
}

// ------------------------- ADMIN: DASHBOARD -------------------------------

  app.innerHTML = `

      <div class="admin-topo">
        <div>

        <div class="resumo-card"><div class="num">${declinados}</div><div class="rot">Não vão comparecer</div></div>
        <div class="resumo-card"><div class="num">${reservados}/${presentes.length}</div><div class="rot">Presentes reservados</div></div>
      </div>

      <div class="admin-bloco">
        <div class="admin-bloco-topo">
          <h2>Convidados</h2>
          <button class="botao botao-primario botao-pequeno" id="btn-exportar-csv">Exportar Dados para CSV</button>
        </div>
        <div class="tabela-wrap">
          <table class="planilha">
            <thead>
              <tr>
                <th>Nome do Convidado</th>
                <th>Presença</th>
                <th>Presente Reservado</th>
                <th>Faixa de Preço</th>
                <th>Data e Hora da Resposta</th>
              </tr>
            </thead>
            <tbody id="tbody-convidados"></tbody>
          </table>
        </div>
      </div>

      <div class="admin-bloco">
        <div class="admin-bloco-topo">
          <h2>Presentes cadastrados</h2>
        </div>

        <form id="form-novo-presente" class="form-inline" style="margin-bottom:18px;">
          <div class="campo">
            <label for="np-nome">Nome do item</label>
            <input type="text" id="np-nome" placeholder="Ex.: Jogo de Talheres" required>
          </div>
          <div class="campo">
            <label for="np-foto">Foto (do seu computador)</label>
            <div class="upload-foto">
              <img class="miniatura" id="np-foto-preview" alt="Pré-visualização">
              <input type="file" id="np-foto" accept="image/*">
            </div>
          </div>
          <div class="campo">
            <label for="np-preco">Faixa de preço</label>
            <select id="np-preco">
              ${FAIXAS_PRECO.map(f => `<option value="${f.codigo}">${f.rotulo}</option>`).join('')}
            </select>
          </div>
          <button type="submit" class="botao botao-secundario">Salvar Novo Presente</button>
        </form>

        <div class="tabela-wrap">
          <table class="planilha">
            <thead>
              <tr>
                <th>Presente</th>
                <th>Faixa de Preço</th>
                <th>Status</th>
                <th></th>

async function handleSalvarConfig(ev){
  ev.preventDefault();
  const dataEvento = document.getElementById('cfg-data').value.trim() || CONFIG_PADRAO.dataEvento;
  const mensagem = document.getElementById('cfg-mensagem').value.trim() || CONFIG_PADRAO.mensagem;
  configuracoes = { dataEvento, mensagem };
  await gravarChave(CHAVE_CONFIG, configuracoes);
  mostrarToast('Configurações salvas! Já valem para todo mundo que abrir o link.');
}

function preencherTabelaConvidados(){
  const tbody = document.getElementById('tbody-convidados');
  if(!tbody) return;

  if(convidados.length === 0){
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--tinta-suave);padding:24px;">Nenhuma resposta recebida ainda.</td></tr>`;
    return;
  }

  const linhas = [...convidados]
    .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))
    .map(g => {
      const presente = presentes.find(p => normalizarNome(p.reservadoPor) === normalizarNome(g.nome));
      const tagPresenca = g.rsvp === 'sim'
        ? `<span class="tag tag-sim">Confirmou</span>`
        : `<span class="tag tag-nao">Declinou</span>`;
      return `
        <tr>
          <td>${escapeHtml(g.nome)}</td>
          <td>${tagPresenca}</td>
          <td>${presente ? escapeHtml(presente.nome) : '—'}</td>
          <td>${presente ? escapeHtml(rotuloFaixa(presente.preco)) : '—'}</td>
          <td>${formatarDataHora(g.timestamp)}</td>
        </tr>
      `;
    }).join('');
  tbody.innerHTML = linhas;
}

function preencherTabelaPresentes(){
  const tbody = document.getElementById('tbody-presentes');
  if(!tbody) return;

  tbody.innerHTML = presentes.map(p => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          <img src="${p.foto}" alt="" style="width:36px;height:36px;border-radius:8px;object-fit:cover;border:1px solid var(--linha);flex-shrink:0;">
          ${escapeHtml(p.nome)}
        </div>
      </td>
      <td>${escapeHtml(rotuloFaixa(p.preco))}</td>
      <td>${p.reservadoPor ? `<span class="tag tag-nao">Reservado por ${escapeHtml(p.reservadoPor)}</span>` : `<span class="tag tag-livre">Disponível</span>`}</td>
      <td style="white-space:nowrap;">
        <button class="botao botao-fantasma botao-pequeno btn-editar-presente" data-id="${p.id}">Editar</button>
        <button class="botao botao-fantasma botao-pequeno btn-remover-presente" data-id="${p.id}">Remover</button>
      </td>
    </tr>
  `).join('');

  tbody.querySelectorAll('.btn-remover-presente').forEach(btn=>{
    btn.addEventListener('click', () => removerPresente(btn.dataset.id));
  });
  tbody.querySelectorAll('.btn-editar-presente').forEach(btn=>{
    btn.addEventListener('click', () => abrirModalEditarPresente(btn.dataset.id));
  });
}

// ------------------------- ADMIN: EDITAR PRESENTE -------------------------------
function abrirModalEditarPresente(id){
  const presente = presentes.find(p => p.id === id);
  if(!presente) return;
  fotoEdicaoDataUrl = null;

  const overlay = abrirModal(`
    <h3>Editar presente</h3>
    <form id="form-editar-presente">
      <div class="campo">
        <label for="ep-nome">Nome do item</label>
        <input type="text" id="ep-nome" value="${escapeHtml(presente.nome)}" required>
      </div>
      <div class="campo">
        <label for="ep-foto">Foto</label>
        <div class="upload-foto">
          <img class="miniatura" id="ep-foto-preview" src="${presente.foto}" alt="Pré-visualização">
          <input type="file" id="ep-foto" accept="image/*">
        </div>
        <div class="dica">Deixe em branco para manter a foto atual.</div>
      </div>
      <div class="campo">
        <label for="ep-preco">Faixa de preço</label>
        <select id="ep-preco">
          ${FAIXAS_PRECO.map(f => `<option value="${f.codigo}" ${f.codigo === presente.preco ? 'selected' : ''}>${f.rotulo}</option>`).join('')}
        </select>
      </div>
      <div class="modal-botoes">
        <button type="button" class="botao botao-fantasma" id="ep-cancelar">Cancelar</button>
        <button type="submit" class="botao botao-primario">Salvar Alterações</button>
      </div>
    </form>
  `);

  overlay.querySelector('#ep-cancelar').addEventListener('click', fecharModal);
  overlay.querySelector('#ep-foto').addEventListener('change', async (ev) => {
    const arquivo = ev.target.files[0];
    if(!arquivo) return;
    try{
      fotoEdicaoDataUrl = await redimensionarImagem(arquivo);
      overlay.querySelector('#ep-foto-preview').src = fotoEdicaoDataUrl;
    }catch(e){
      mostrarToast('Não foi possível carregar essa imagem.', 'erro');
    }
  });
  overlay.querySelector('#form-editar-presente').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const nome = overlay.querySelector('#ep-nome').value.trim();
    if(!nome){ mostrarToast('Digite o nome do presente.', 'erro'); return; }
    presente.nome = nome;
    presente.preco = overlay.querySelector('#ep-preco').value;
    if(fotoEdicaoDataUrl) presente.foto = fotoEdicaoDataUrl;
    await gravarChave(CHAVE_PRESENTES, presentes);
    fecharModal();
    preencherTabelaPresentes();
    preencherTabelaConvidados();
    mostrarToast('Presente atualizado com sucesso!');
  });
}

async function handleAdicionarPresente(ev){
  ev.preventDefault();
  const nome = document.getElementById('np-nome').value.trim();
  const preco = document.getElementById('np-preco').value;

  if(!nome){ mostrarToast('Digite o nome do presente.', 'erro'); return; }

  const foto = fotoSelecionadaDataUrl ||
    `https://placehold.co/400x300/8FA9C4/FFFFFF?text=${encodeURIComponent(nome || 'Presente')}`;

  presentes.push({ id: 'g' + Date.now(), nome, foto, preco, reservadoPor: null });
  await gravarChave(CHAVE_PRESENTES, presentes);
  preencherTabelaPresentes();
  preencherTabelaConvidados();
  document.getElementById('form-novo-presente').reset();
  fotoSelecionadaDataUrl = null;
  document.getElementById('np-foto-preview').src = 'https://placehold.co/100x100/E7E2D6/7A7369?text=%20';
  mostrarToast(`"${nome}" foi adicionado à lista de presentes!`);
}

function removerPresente(id){
  abrirModalConfirmacao('Remover este presente da lista?', async () => {
    presentes = presentes.filter(p => p.id !== id);
    await gravarChave(CHAVE_PRESENTES, presentes);
    preencherTabelaPresentes();
    preencherTabelaConvidados();
    mostrarToast('Presente removido.');
  });
}

function exportarCsv(){
  const cabecalho = ['Nome do Convidado','Presenca','Presente Reservado','Faixa de Preco','Data e Hora da Resposta'];
  const linhas = convidados.map(g => {
    const presente = presentes.find(p => normalizarNome(p.reservadoPor) === normalizarNome(g.nome));
    return [
      g.nome,
      g.rsvp === 'sim' ? 'Confirmou' : 'Declinou',
      presente ? presente.nome : '-',
      presente ? rotuloFaixa(presente.preco) : '-',
      formatarDataHora(g.timestamp)
    ];
  });

  const escapeCsv = (v) => {
    const s = String(v ?? '');
    if(/[",\n;]/.test(s)) return `"${s.replace(/"/g,'""')}"`;
    return s;
  };

  const csv = [cabecalho, ...linhas].map(l => l.map(escapeCsv).join(';')).join('\r\n');
  // BOM no início para o Excel reconhecer acentuação corretamente
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cha_de_panela_convidados.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ------------------------- INICIALIZAÇÃO -------------------------------
(async function iniciar(){
  await testarAmbienteStorage();
  await carregarDados();
  renderEntrada();
})();
